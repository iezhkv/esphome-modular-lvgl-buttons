---
# Local light button — full RGB / CCT / brightness UI for any ESPHome light
# Capabilities (RGB, CCT, brightness-only) are detected at runtime from traits.
#
# vars:
#   uid:          unique identifier
#   entity_id:    ESPHome light component ID (must be defined before this button)
#   row:          grid row position
#   column:       grid column position
#   text:         label text
#   icon:         icon glyph (optional, default: $mdi_lightbulb)
#   row_span:     (default: 1)
#   column_span:  (default: 1)
#   page_id:             parent page (default: main_page)
#   auto_return_seconds: detail-page inactivity timeout in seconds
#                        (default: 120, set to 0 to disable)

packages:
  ${uid}_detail: !include
    file: detail.yaml
    vars:
      uid: ${uid}
      text: ${text}
      page_id: ${page_id | default("main_page")}
      auto_return_seconds: ${auto_return_seconds | default(120)}

lvgl:
  pages:
  - id: !extend ${page_id | default("main_page")}
    widgets:
    - container:
        id: ${uid}_tile
        grid_cell_row_pos: ${row}
        grid_cell_column_pos: ${column}
        grid_cell_row_span: ${row_span | default(1)}
        grid_cell_column_span: ${column_span | default(1)}
        grid_cell_x_align: stretch
        grid_cell_y_align: stretch
        widgets:
        - button:
            id: button_${uid}
            widgets:
            - label:
                id: icon_${uid}
                text_font: $icon_font
                align: top_left
                text: ${icon}
            - label:
                id: label_${uid}
                align: bottom_left
                long_mode: wrap
                width: 100%
                text: ${text}
            - slider:
                id: slider_${uid}
                align: top_right
                x: -5
                y: 10
                width: 30%
                height: 75%
                min_value: 0
                max_value: 255
                radius: 10
                knob:
                  pad_top: -5
                  pad_bottom: -5
                  bg_color: $label_on_color
                indicator:
                  radius: 0
                  bg_color: $label_off_color
                on_release:
                - globals.set:
                    id: ${uid}_current_brightness
                    value: !lambda return x / 255.0f;
                - script.execute: ${uid}_light_set_brightness
            on_short_click:
              then:
              - script.execute: ${uid}_light_toggle
            on_long_press:
              then:
              - lvgl.page.show:
                  id: ${uid}_light_page
                  animation: MOVE_LEFT
                  time: 300ms
              - script.execute: ${uid}_reset_page_timeout

# ── Hook into the light's state changes ───────────────────────────────────────
light:
- id: !extend ${entity_id}
  on_state:
    then:
    - lambda: |-
        // Detect capabilities from hardware traits (runs every state change,
        // but traits are static so this is effectively a one-time detection)
        auto traits = id(${entity_id}).get_traits();
        id(${uid}_supports_rgb) =
          traits.supports_color_capability(esphome::light::ColorCapability::RGB);
        id(${uid}_supports_color_temp) =
          traits.supports_color_capability(esphome::light::ColorCapability::COLOR_TEMPERATURE) ||
          traits.supports_color_capability(esphome::light::ColorCapability::COLD_WARM_WHITE);
        id(${uid}_supports_brightness) =
          traits.supports_color_capability(esphome::light::ColorCapability::BRIGHTNESS) ||
          id(${uid}_supports_rgb) || id(${uid}_supports_color_temp);

        // Sync current state to globals
        auto val = id(${entity_id}).remote_values;
        id(${uid}_is_on) = val.is_on();
        id(${uid}_current_brightness) = val.get_brightness();

        if (id(${uid}_supports_rgb)) {
          float r = val.get_red(), g = val.get_green(), bv = val.get_blue();
          float max_c = std::max({r, g, bv});
          float min_c = std::min({r, g, bv});
          float delta = max_c - min_c;
          float hue = 0;
          if (delta > 0) {
            if (max_c == r)  hue = 60.0f * fmod((g - bv) / delta, 6.0f);
            else if (max_c == g) hue = 60.0f * ((bv - r) / delta + 2.0f);
            else                 hue = 60.0f * ((r - g)  / delta + 4.0f);
            if (hue < 0) hue += 360.0f;
          }
          id(${uid}_current_hue) = hue;
          id(${uid}_current_saturation) = (max_c > 0) ? (delta / max_c) * 100.0f : 0;
        }
        if (id(${uid}_supports_color_temp)) {
          float mireds = val.get_color_temperature();
          if (mireds > 0) id(${uid}_current_color_temp) = 1000000.0f / mireds;
        }
    - script.execute: ${uid}_sync_state
    - script.execute: ${uid}_update_bulb_color

script:
# ── Abstract action scripts — LOCAL implementation ────────────────────────────

- id: ${uid}_light_toggle
  then:
  - light.toggle: ${entity_id}

- id: ${uid}_light_set_brightness
  then:
  - light.turn_on:
      id: ${entity_id}
      brightness: !lambda return id(${uid}_current_brightness);

- id: ${uid}_light_apply_hs
  then:
  - light.turn_on:
      id: ${entity_id}
      red: !lambda |-
        float h = id(${uid}_current_hue);
        float s = id(${uid}_current_saturation) / 100.0f;
        float c = s, xv = c * (1.0f - fabs(fmod(h / 60.0f, 2.0f) - 1.0f)), m = 1.0f - c;
        float r = (h < 60) ? c : (h < 120) ? xv : (h >= 300) ? c : 0.0f;
        return r + m;
      green: !lambda |-
        float h = id(${uid}_current_hue);
        float s = id(${uid}_current_saturation) / 100.0f;
        float c = s, xv = c * (1.0f - fabs(fmod(h / 60.0f, 2.0f) - 1.0f)), m = 1.0f - c;
        float g = (h >= 60 && h < 120) ? c : (h < 60 || (h >= 120 && h < 180)) ? xv : 0.0f;
        return g + m;
      blue: !lambda |-
        float h = id(${uid}_current_hue);
        float s = id(${uid}_current_saturation) / 100.0f;
        float c = s, xv = c * (1.0f - fabs(fmod(h / 60.0f, 2.0f) - 1.0f)), m = 1.0f - c;
        float bv = (h >= 180 && h < 240) ? c : (h >= 120 && h < 180 || h >= 240 && h < 300) ? xv : 0.0f;
        return bv + m;

- id: ${uid}_light_apply_color_temp
  then:
  - light.turn_on:
      id: ${entity_id}
      # ESPHome color_temperature is in mireds; detail page stores Kelvin
      color_temperature: !lambda return 1000000.0f / id(${uid}_current_color_temp);
