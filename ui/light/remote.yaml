---
# Remote light button — full RGB / CCT / brightness UI for Home Assistant lights
# Capabilities are detected at runtime from the HA supported_color_modes attribute.
#
# vars:
#   uid:          unique identifier
#   entity_id:    HA light entity (e.g. "light.kitchen")
#   row:          grid row position
#   column:       grid column position
#   text:         label text
#   icon:         icon glyph (optional, default: $mdi_lightbulb)
#   row_span:     (default: 1)
#   column_span:  (default: 1)
#   page_id:             parent page (default: main_page)
#   auto_return_seconds: detail-page inactivity timeout in seconds
#                        (default: 120, set to 0 to disable)

packages:
  ${uid}_detail: !include
    file: detail.yaml
    vars:
      uid: ${uid}
      text: ${text}
      page_id: ${page_id | default("main_page")}
      auto_return_seconds: ${auto_return_seconds | default(120)}

lvgl:
  pages:
  - id: !extend ${page_id | default("main_page")}
    widgets:
    - container:
        id: ${uid}_tile
        grid_cell_row_pos: ${row}
        grid_cell_column_pos: ${column}
        grid_cell_row_span: ${row_span | default(1)}
        grid_cell_column_span: ${column_span | default(1)}
        grid_cell_x_align: stretch
        grid_cell_y_align: stretch
        widgets:
        - button:
            id: button_${uid}
            widgets:
            - label:
                id: icon_${uid}
                text_font: $icon_font
                align: top_left
                text: ${icon}
            - label:
                id: label_${uid}
                align: bottom_left
                long_mode: wrap
                width: 100%
                text: ${text}
            - slider:
                id: slider_${uid}
                align: top_right
                x: -5
                y: 10
                width: 30%
                height: 75%
                min_value: 0
                max_value: 255
                radius: 10
                knob:
                  pad_top: -5
                  pad_bottom: -5
                  bg_color: $label_on_color
                indicator:
                  radius: 0
                  bg_color: $label_off_color
                on_release:
                - globals.set:
                    id: ${uid}_current_brightness
                    value: !lambda return x / 255.0f;
                - script.execute: ${uid}_light_set_brightness
            on_short_click:
              then:
              - script.execute: ${uid}_light_toggle
            on_long_press:
              then:
              - lvgl.page.show:
                  id: ${uid}_light_page
                  animation: MOVE_LEFT
                  time: 300ms
              - script.execute: ${uid}_reset_page_timeout

# ── HA state sensors ──────────────────────────────────────────────────────────

binary_sensor:
- id: ${uid}_ha_state
  platform: homeassistant
  entity_id: ${entity_id}
  trigger_on_initial_state: true
  on_state:
  - lambda: id(${uid}_is_on) = x;
  - script.execute: ${uid}_sync_state
  - script.execute: ${uid}_update_bulb_color

text_sensor:
# Brightness (text sensor avoids NaN on lights that don't report it)
- id: ${uid}_ha_brightness
  platform: homeassistant
  entity_id: ${entity_id}
  attribute: brightness
  internal: true
  on_value:
  - if:
      condition:
        lambda: return !x.empty() && x != "None";
      then:
      - lambda: id(${uid}_current_brightness) = atof(x.c_str()) / 255.0f;
      - lvgl.slider.update:
          id: slider_${uid}
          value: !lambda return id(${uid}_current_brightness) * 255;
      - lvgl.slider.update:
          id: ${uid}_brightness_slider
          value: !lambda return id(${uid}_current_brightness) * 255;
      - script.execute: ${uid}_update_bulb_color

# Color temperature in Kelvin
- id: ${uid}_ha_color_temp
  platform: homeassistant
  entity_id: ${entity_id}
  attribute: color_temp_kelvin
  internal: true
  on_value:
  - if:
      condition:
        lambda: return !x.empty() && x != "None";
      then:
      - lambda: id(${uid}_current_color_temp) = atof(x.c_str());
      - lvgl.arc.update:
          id: ${uid}_arc_color_temp
          value: !lambda return (int)id(${uid}_current_color_temp);
      - script.execute: ${uid}_update_bulb_color

# HS color — HA returns a tuple string like "(120.5, 80.0)"
- id: ${uid}_ha_hs_color
  platform: homeassistant
  entity_id: ${entity_id}
  attribute: hs_color
  internal: true
  on_value:
  - if:
      condition:
        lambda: return !x.empty() && x != "None";
      then:
      - lambda: |-
          size_t comma = x.find(',');
          if (comma != std::string::npos) {
            id(${uid}_current_hue) = atof(x.substr(0, comma).c_str());
            id(${uid}_current_saturation) = atof(x.substr(comma + 1).c_str());
          }
      - lvgl.arc.update:
          id: ${uid}_arc_hue
          value: !lambda return (int)id(${uid}_current_hue);
      - lvgl.slider.update:
          id: ${uid}_saturation_slider
          value: !lambda return (int)id(${uid}_current_saturation);
      - script.execute: ${uid}_update_bulb_color

# Supported color modes → detect capabilities and update UI visibility
- id: ${uid}_ha_supported_modes
  platform: homeassistant
  entity_id: ${entity_id}
  attribute: supported_color_modes
  internal: true
  on_value:
  - lambda: |-
      id(${uid}_supports_color_temp) = x.find("color_temp") != std::string::npos;
      id(${uid}_supports_rgb)        = x.find("rgb") != std::string::npos ||
                                       x.find("hs")  != std::string::npos;
      id(${uid}_supports_brightness) = id(${uid}_supports_rgb) ||
                                       id(${uid}_supports_color_temp) ||
                                       x.find("brightness") != std::string::npos;
  - script.execute: ${uid}_update_visibility

script:
# ── Abstract action scripts — REMOTE implementation ───────────────────────────

- id: ${uid}_light_toggle
  then:
  - homeassistant.action:
      action: homeassistant.toggle
      data:
        entity_id: ${entity_id}

- id: ${uid}_light_set_brightness
  then:
  - homeassistant.action:
      action: light.turn_on
      data:
        entity_id: ${entity_id}
        brightness: !lambda return (int)(id(${uid}_current_brightness) * 255.0f);

- id: ${uid}_light_apply_hs
  then:
  - homeassistant.action:
      action: light.turn_on
      data:
        entity_id: ${entity_id}
      data_template:
        hs_color: "{{ (hue|float, sat|float)|list }}"
      variables:
        hue: !lambda return id(${uid}_current_hue);
        sat: !lambda return id(${uid}_current_saturation);

- id: ${uid}_light_apply_color_temp
  then:
  - homeassistant.action:
      action: light.turn_on
      data:
        entity_id: ${entity_id}
        color_temp_kelvin: !lambda return (int)id(${uid}_current_color_temp);
